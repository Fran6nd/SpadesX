name: Build

on:
  push:
    branches: ['**']

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: ubuntu-24.04-arm
            name: Linux ARM64
          - os: macos-latest
            name: macOS ARM
          - os: macos-15-intel
            name: macOS Intel

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjson-c-dev libreadline-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install --quiet json-c readline

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B ${{ github.workspace }}/build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="$(brew --prefix json-c);$(brew --prefix readline)"

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: SpadesX-${{ matrix.name }}
          path: ${{ github.workspace }}/build/SpadesX
